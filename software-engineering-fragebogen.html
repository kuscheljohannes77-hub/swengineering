<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Software Engineering Fragebogen</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #1f6feb;
      --help: #fff3c4;
      --help-line: #d99a00;
      --external: #e9f2ff;
      --external-line: #2f80ed;
      --done: #e7f7ee;
      --done-line: #198754;
      --na: #eef1f5;
      --danger: #c62828;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.55rem;
      letter-spacing: 0;
    }

    h2 {
      margin: 30px 0 12px;
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
    }

    .hint {
      color: var(--muted);
      max-width: 820px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
      align-items: end;
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }

    label {
      font-weight: 650;
      font-size: 0.88rem;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 10px;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 12px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.danger {
      border-color: #f1b8b8;
      color: var(--danger);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .section {
      margin: 18px 0 30px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .section-count {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    details.question {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      margin: 8px 0;
      overflow: hidden;
    }

    details.question[open] {
      box-shadow: var(--shadow);
    }

    details.question.needs-help {
      border-color: var(--help-line);
      background: var(--help);
    }

    details.question.external-input {
      border-left: 8px solid var(--external-line);
    }

    details.question.external-input:not(.needs-help):not(.done):not(.not-applicable) {
      background: var(--external);
    }

    details.question.done {
      border-color: var(--done-line);
      background: var(--done);
    }

    details.question.not-applicable {
      background: var(--na);
    }

    summary {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      cursor: pointer;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .question-title {
      min-width: 0;
      font-weight: 650;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 3px 8px;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .badge.help {
      border-color: var(--help-line);
      color: #7a5200;
      background: #fff7d6;
    }

    .badge.external {
      border-color: var(--external-line);
      color: #1254a3;
      background: #f1f7ff;
    }

    .badge.done {
      border-color: var(--done-line);
      color: #146c43;
      background: #f0fff6;
    }

    .question-body {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(255, 255, 255, 0.58);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.92rem;
    }

    .check-row input {
      width: auto;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .small-note {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 8px;
    }

    .followups {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .followups h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      letter-spacing: 0;
    }

    details.followup {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      margin: 8px 0;
      overflow: hidden;
    }

    details.followup.external-input {
      border-left: 6px solid var(--external-line);
    }

    details.followup.needs-help {
      border-color: var(--help-line);
      background: var(--help);
    }

    details.followup.done {
      border-color: var(--done-line);
      background: var(--done);
    }

    .followup-body {
      border-top: 1px solid var(--line);
      padding: 12px;
    }

    .hidden {
      display: none !important;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      padding: 24px;
      text-align: center;
    }

    @media (max-width: 860px) {
      .toolbar,
      .question-body,
      .meta-grid,
      .stats {
        grid-template-columns: 1fr;
      }

      .span-2,
      .span-3,
      .span-4 {
        grid-column: span 1;
      }

      summary {
        grid-template-columns: 1fr;
      }

      .badges {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Software Engineering Fragebogen</h1>
      <p class="hint">
        Interaktive Version der Mastercheckliste. Antworten werden automatisch im Browser gespeichert.
        Fuer gemeinsame Bearbeitung im Team: JSON exportieren und im Projekt-Repository ablegen.
      </p>

      <section class="toolbar" aria-label="Werkzeuge">
        <div class="field span-2">
          <label for="projectName">Projekt</label>
          <input id="projectName" value="JazzHomeConcert" autocomplete="off">
        </div>

        <div class="field span-2">
          <label for="checklistSource">Checkliste</label>
          <select id="checklistSource">
            <option value="short">Kurzversion 30 Fragen</option>
            <option value="master">Mastercheckliste</option>
          </select>
        </div>

        <div class="field span-2">
          <label for="search">Suchen</label>
          <input id="search" placeholder="z. B. Risiko, Use Case, Budget">
        </div>

        <div class="field span-2">
          <label for="filter">Filter</label>
          <select id="filter">
            <option value="all">Alle Fragen</option>
            <option value="open">Offen</option>
            <option value="answered">Beantwortet</option>
            <option value="help">Brauche Hilfe</option>
            <option value="external">Klärung extern</option>
            <option value="na">Nicht relevant</option>
          </select>
        </div>

        <div class="field span-2">
          <label for="sortMode">Sortierung</label>
          <select id="sortMode">
            <option value="original">Original</option>
            <option value="external-first">Klärung extern zuerst</option>
            <option value="help-first">Brauche Hilfe zuerst</option>
            <option value="open-first">Offen zuerst</option>
            <option value="answered-first">Beantwortet zuerst</option>
          </select>
        </div>

        <div class="field span-2">
          <label>Aktionen</label>
          <div class="button-row">
            <button class="primary" id="exportJson" type="button">JSON exportieren</button>
            <button id="exportMarkdown" type="button">Markdown exportieren</button>
            <button id="importButton" type="button">JSON importieren</button>
            <button class="danger" id="resetProject" type="button">Projekt leeren</button>
          </div>
          <input class="hidden" id="importFile" type="file" accept="application/json,.json">
        </div>
      </section>
    </div>
  </header>

  <main class="wrap">
    <section class="stats" aria-label="Statistik">
      <div class="stat"><strong id="statTotal">0</strong><span>Fragen</span></div>
      <div class="stat"><strong id="statAnswered">0</strong><span>Beantwortet</span></div>
      <div class="stat"><strong id="statOpen">0</strong><span>Offen</span></div>
      <div class="stat"><strong id="statHelp">0</strong><span>Brauche Hilfe</span></div>
      <div class="stat"><strong id="statExternal">0</strong><span>Klärung extern</span></div>
      <div class="stat"><strong id="statNa">0</strong><span>Nicht relevant</span></div>
    </section>

    <div id="loadError" class="empty hidden"></div>
    <div id="questionnaire"></div>
  </main>

  <script>
    const CHECKLISTS = {
      short: {
        label: "Kurzversion 30 Fragen",
        url: "software-engineering-checkliste-kurz-30.md"
      },
      master: {
        label: "Mastercheckliste",
        url: "software-engineering-checkliste.md"
      }
    };
    const STORAGE_PREFIX = "se-questionnaire:";
    const state = {
      project: "JazzHomeConcert",
      checklist: "short",
      sections: [],
      answers: {}
    };

    const els = {
      projectName: document.querySelector("#projectName"),
      checklistSource: document.querySelector("#checklistSource"),
      search: document.querySelector("#search"),
      filter: document.querySelector("#filter"),
      sortMode: document.querySelector("#sortMode"),
      questionnaire: document.querySelector("#questionnaire"),
      loadError: document.querySelector("#loadError"),
      statTotal: document.querySelector("#statTotal"),
      statAnswered: document.querySelector("#statAnswered"),
      statOpen: document.querySelector("#statOpen"),
      statHelp: document.querySelector("#statHelp"),
      statExternal: document.querySelector("#statExternal"),
      statNa: document.querySelector("#statNa"),
      exportJson: document.querySelector("#exportJson"),
      exportMarkdown: document.querySelector("#exportMarkdown"),
      importButton: document.querySelector("#importButton"),
      importFile: document.querySelector("#importFile"),
      resetProject: document.querySelector("#resetProject")
    };

    function slugify(value) {
      return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 90);
    }

    function storageKey() {
      return STORAGE_PREFIX + state.checklist + ":" + slugify(state.project || "unbenannt");
    }

    function emptyAnswer() {
      return {
        status: "open",
        needsHelp: false,
        answer: "",
        owner: "",
        source: "",
        updatedAt: ""
      };
    }

    function parseMasterChecklist(markdown) {
      const sections = [];
      let current = null;
      const lines = markdown.split(/\r?\n/);

      for (const line of lines) {
        const sectionMatch = line.match(/^##\s+(.+)$/);
        if (sectionMatch) {
          current = {
            id: slugify(sectionMatch[1]),
            title: sectionMatch[1],
            questions: []
          };
          sections.push(current);
          continue;
        }

        const questionMatch = line.match(/^-\s+\[[ xX]\]\s+(.+\?)\s*$/);
        if (questionMatch && current) {
          const text = questionMatch[1].trim();
          current.questions.push({
            id: current.id + ":" + slugify(text) + ":" + current.questions.length,
            text
          });
        }
      }

      return sections.filter(section => section.questions.length > 0);
    }

    function parseShortChecklist(markdown) {
      const section = {
        id: "kurz-checkliste-30",
        title: "Kurz-Checkliste: 30 Kernfragen",
        questions: []
      };
      let current = null;
      let inFollowups = false;
      const lines = markdown.split(/\r?\n/);

      for (const line of lines) {
        const questionMatch = line.match(/^##\s+(\d+\.\s+.+\?)\s*$/);
        if (questionMatch) {
          const text = questionMatch[1].trim();
          current = {
            id: section.id + ":" + slugify(text),
            text,
            followUps: []
          };
          section.questions.push(current);
          inFollowups = false;
          continue;
        }

        if (/^Folgefragen:\s*$/.test(line.trim())) {
          inFollowups = true;
          continue;
        }

        const followupMatch = line.match(/^-\s+(.+\?)\s*$/);
        if (current && inFollowups && followupMatch) {
          const text = followupMatch[1].trim();
          current.followUps.push({
            id: current.id + ":folgefrage:" + slugify(text) + ":" + current.followUps.length,
            text
          });
        }
      }

      return [section];
    }

    function parseChecklist(markdown) {
      return state.checklist === "short"
        ? parseShortChecklist(markdown)
        : parseMasterChecklist(markdown);
    }

    function loadAnswers() {
      try {
        state.answers = JSON.parse(localStorage.getItem(storageKey())) || {};
      } catch {
        state.answers = {};
      }
    }

    function saveAnswers() {
      localStorage.setItem(storageKey(), JSON.stringify(state.answers));
    }

    function getAnswer(questionId) {
      if (!state.answers[questionId]) {
        state.answers[questionId] = emptyAnswer();
      }
      return state.answers[questionId];
    }

    function setAnswer(questionId, patch) {
      state.answers[questionId] = {
        ...getAnswer(questionId),
        ...patch,
        updatedAt: new Date().toISOString()
      };
      saveAnswers();
      render();
    }

    function saveAnswerQuietly(questionId, patch) {
      state.answers[questionId] = {
        ...getAnswer(questionId),
        ...patch,
        updatedAt: new Date().toISOString()
      };
      saveAnswers();
    }

    function statusLabel(answer) {
      if (answer.needsHelp) return "Brauche Hilfe";
      if (answer.status === "answered") return "Beantwortet";
      if (answer.status === "na") return "Nicht relevant";
      return "Offen";
    }

    function statusClass(answer) {
      if (answer.needsHelp) return "needs-help";
      if (answer.status === "answered") return "done";
      if (answer.status === "na") return "not-applicable";
      return "";
    }

    function badgeClass(answer) {
      if (answer.needsHelp) return "help";
      if (answer.status === "answered") return "done";
      return "";
    }

    function likelyNeedsExternalInput(question, section, parentQuestion = null) {
      const text = `${section.title} ${parentQuestion ? parentQuestion.text : ""} ${question.text}`.toLowerCase();
      const strongSignals = [
        "auftraggeber",
        "auftragnehmer",
        "kunde",
        "kunden",
        "stakeholder",
        "benutzer",
        "nutzer",
        "bezahlt",
        "finanziert",
        "budget",
        "entscheidet",
        "entscheidungskompetenz",
        "genehmigt",
        "abnahme",
        "nimmt das system ab",
        "externe",
        "partner",
        "lieferanten",
        "dienstleister",
        "behoerden",
        "gesetz",
        "gesetzlich",
        "rechtlich",
        "dsgvo",
        "datenschutz",
        "compliance",
        "audit",
        "api",
        "apis",
        "schnittstelle",
        "rate limits",
        "fremdsystem",
        "externes system",
        "on-premises",
        "cloud",
        "sla",
        "servicezeiten",
        "support",
        "betrieb",
        "bereitschaft",
        "wer betreibt",
        "wer installiert",
        "wer aktualisiert",
        "wer darf",
        "wer misst",
        "wer bekommt",
        "wer schreibt",
        "wer prueft",
        "wer testet",
        "wer nimmt",
        "wer hat zugriff",
        "wer bekommt alarme",
        "personenbezogene daten",
        "aufbewahrungsfristen",
        "loeschfristen",
        "rechtsgrundlage",
        "auftragsverarbeitung",
        "drittland"
      ];

      const sectionSignals = [
        "stakeholder",
        "benutzergruppen",
        "sicherheit",
        "datenschutz",
        "recht",
        "compliance",
        "schnittstellen",
        "integrationen",
        "deployment",
        "betrieb",
        "support",
        "abnahme"
      ];

      return strongSignals.some(signal => text.includes(signal)) ||
        sectionSignals.some(signal => section.title.toLowerCase().includes(signal));
    }

    function questionRank(question, section) {
      const answer = getAnswer(question.id);
      const external = likelyNeedsExternalInput(question, section);
      if (els.sortMode.value === "external-first") return external ? 0 : 1;
      if (els.sortMode.value === "help-first") return answer.needsHelp ? 0 : 1;
      if (els.sortMode.value === "open-first") return answer.status === "open" ? 0 : 1;
      if (els.sortMode.value === "answered-first") return answer.status === "answered" ? 0 : 1;
      return 0;
    }

    function visibleQuestion(question) {
      const answer = getAnswer(question.id);
      const section = state.sections.find(item => item.questions.some(candidate => candidate.id === question.id));
      const external = section ? likelyNeedsExternalInput(question, section) : false;
      const followUps = question.followUps || [];
      const followUpAnswers = followUps.map(item => getAnswer(item.id));
      const search = els.search.value.trim().toLowerCase();
      const filter = els.filter.value;
      const haystack = [
        question.text,
        ...followUps.map(item => item.text),
        answer.answer,
        answer.owner,
        answer.source,
        ...followUpAnswers.flatMap(item => [item.answer, item.owner, item.source])
      ].join(" ").toLowerCase();

      if (search && !haystack.includes(search)) return false;
      if (filter === "open") return answer.status === "open" && !answer.needsHelp;
      if (filter === "answered") return answer.status === "answered";
      if (filter === "help") return answer.needsHelp || followUpAnswers.some(item => item.needsHelp);
      if (filter === "external") {
        return external || followUps.some(item => section && likelyNeedsExternalInput(item, section, question));
      }
      if (filter === "na") return answer.status === "na";
      return true;
    }

    function renderStats() {
      const allItems = state.sections.flatMap(section =>
        section.questions.flatMap(question => [
          { item: question, section, parent: null },
          ...(question.followUps || []).map(followUp => ({ item: followUp, section, parent: question }))
        ])
      );
      const itemAnswers = allItems.map(({ item }) => getAnswer(item.id));
      const answered = itemAnswers.filter(answer => answer.status === "answered").length;
      const help = itemAnswers.filter(answer => answer.needsHelp).length;
      const na = itemAnswers.filter(answer => answer.status === "na").length;
      const external = allItems.filter(({ item, section, parent }) =>
        likelyNeedsExternalInput(item, section, parent)
      ).length;
      const open = itemAnswers.length - answered - na;

      els.statTotal.textContent = allItems.length;
      els.statAnswered.textContent = answered;
      els.statOpen.textContent = open;
      els.statHelp.textContent = help;
      els.statExternal.textContent = external;
      els.statNa.textContent = na;
    }

    function render() {
      renderStats();
      const fragments = [];

      for (const section of state.sections) {
        const visible = section.questions
          .filter(visibleQuestion)
          .map((question, index) => ({ question, index }))
          .sort((left, right) => {
            const rankDelta = questionRank(left.question, section) - questionRank(right.question, section);
            return rankDelta || left.index - right.index;
          })
          .map(item => item.question);
        if (visible.length === 0) continue;

        const items = visible.map(question => {
          const answer = getAnswer(question.id);
          const external = likelyNeedsExternalInput(question, section);
          const klass = `${statusClass(answer)} ${external ? "external-input" : ""}`;
          const badge = badgeClass(answer);
          const checked = answer.needsHelp ? "checked" : "";
          const externalBadge = external
            ? `<span class="badge external">Klärung extern</span>`
            : "";
          const followUps = renderFollowUps(question, section);

          return `
            <details class="question ${klass}" data-question-id="${question.id}">
              <summary>
                <span class="question-title">${escapeHtml(question.text)}</span>
                <span class="badges">
                  ${externalBadge}
                  <span class="badge ${badge}">${statusLabel(answer)}</span>
                </span>
              </summary>
              <div class="question-body">
                <div>
                  <label for="status-${question.id}">Status</label>
                  <select id="status-${question.id}" data-action="status">
                    <option value="open" ${answer.status === "open" ? "selected" : ""}>Offen</option>
                    <option value="answered" ${answer.status === "answered" ? "selected" : ""}>Beantwortet</option>
                    <option value="na" ${answer.status === "na" ? "selected" : ""}>Nicht relevant</option>
                  </select>

                  <label class="check-row">
                    <input type="checkbox" data-action="help" ${checked}>
                    <span>Brauche Hilfe</span>
                  </label>

                  <p class="small-note">
                    Gelb bedeutet manuell markiert. Blau bedeutet: vermutlich
                    externe Klärung noetig.
                  </p>
                </div>

                <div>
                  <label for="answer-${question.id}">Antwort / Notizen</label>
                  <textarea id="answer-${question.id}" data-action="answer" placeholder="Antwort, offene Frage, Annahme oder Entscheidung eintragen...">${escapeHtml(answer.answer)}</textarea>

                  <div class="meta-grid">
                    <div class="field">
                      <label for="owner-${question.id}">Verantwortlich</label>
                      <input id="owner-${question.id}" data-action="owner" value="${escapeHtml(answer.owner)}" placeholder="Name / Rolle">
                    </div>
                    <div class="field">
                      <label for="source-${question.id}">Quelle</label>
                      <input id="source-${question.id}" data-action="source" value="${escapeHtml(answer.source)}" placeholder="Meeting, Datei, Person">
                    </div>
                    <div class="field">
                      <label>Zuletzt geaendert</label>
                      <input value="${answer.updatedAt ? formatDate(answer.updatedAt) : "Noch nie"}" readonly>
                    </div>
                  </div>

                  ${followUps}
                </div>
              </div>
            </details>
          `;
        }).join("");

        fragments.push(`
          <section class="section">
            <div class="section-header">
              <h2>${escapeHtml(section.title)}</h2>
              <span class="section-count">${visible.length} von ${section.questions.length} Fragen sichtbar</span>
            </div>
            ${items}
          </section>
        `);
      }

      els.questionnaire.innerHTML = fragments.join("") || `
        <div class="empty">Keine Fragen passen zum aktuellen Filter.</div>
      `;
    }

    function renderFollowUps(question, section) {
      const followUps = question.followUps || [];
      if (followUps.length === 0) return "";

      const items = followUps.map(followUp => {
        const answer = getAnswer(followUp.id);
        const external = likelyNeedsExternalInput(followUp, section, question);
        const klass = `${statusClass(answer)} ${external ? "external-input" : ""}`;
        const badge = badgeClass(answer);
        const checked = answer.needsHelp ? "checked" : "";
        const externalBadge = external
          ? `<span class="badge external">Klärung extern</span>`
          : "";

        return `
          <details class="followup ${klass}" data-question-id="${followUp.id}">
            <summary>
              <span class="question-title">${escapeHtml(followUp.text)}</span>
              <span class="badges">
                ${externalBadge}
                <span class="badge ${badge}">${statusLabel(answer)}</span>
              </span>
            </summary>
            <div class="followup-body">
              <div class="meta-grid">
                <div class="field">
                  <label for="status-${followUp.id}">Status</label>
                  <select id="status-${followUp.id}" data-action="status">
                    <option value="open" ${answer.status === "open" ? "selected" : ""}>Offen</option>
                    <option value="answered" ${answer.status === "answered" ? "selected" : ""}>Beantwortet</option>
                    <option value="na" ${answer.status === "na" ? "selected" : ""}>Nicht relevant</option>
                  </select>
                </div>
                <div class="field">
                  <label class="check-row">
                    <input type="checkbox" data-action="help" ${checked}>
                    <span>Brauche Hilfe</span>
                  </label>
                </div>
                <div class="field">
                  <label>Zuletzt geaendert</label>
                  <input value="${answer.updatedAt ? formatDate(answer.updatedAt) : "Noch nie"}" readonly>
                </div>
              </div>

              <label for="answer-${followUp.id}">Antwort / Notizen</label>
              <textarea id="answer-${followUp.id}" data-action="answer" placeholder="Antwort zur Folgefrage eintragen...">${escapeHtml(answer.answer)}</textarea>

              <div class="meta-grid">
                <div class="field">
                  <label for="owner-${followUp.id}">Verantwortlich</label>
                  <input id="owner-${followUp.id}" data-action="owner" value="${escapeHtml(answer.owner)}" placeholder="Name / Rolle">
                </div>
                <div class="field">
                  <label for="source-${followUp.id}">Quelle</label>
                  <input id="source-${followUp.id}" data-action="source" value="${escapeHtml(answer.source)}" placeholder="Meeting, Datei, Person">
                </div>
              </div>
            </div>
          </details>
        `;
      }).join("");

      return `
        <section class="followups">
          <h3>Folgefragen</h3>
          ${items}
        </section>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("de-DE", {
        dateStyle: "short",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function exportJson() {
      const payload = {
        type: "software-engineering-questionnaire-answers",
        version: 1,
        project: state.project,
        checklist: state.checklist,
        exportedAt: new Date().toISOString(),
        answers: state.answers
      };
      download(
        `${slugify(state.project || "projekt")}-fragebogen-antworten.json`,
        JSON.stringify(payload, null, 2),
        "application/json"
      );
    }

    function exportMarkdown() {
      const lines = [
        `# Fragebogen-Antworten: ${state.project}`,
        "",
        `Exportiert: ${new Date().toLocaleString("de-DE")}`,
        ""
      ];

      for (const section of state.sections) {
        lines.push(`## ${section.title}`, "");
        for (const question of section.questions) {
          const answer = getAnswer(question.id);
          const label = statusLabel(answer);
          lines.push(`### ${question.text}`);
          lines.push("");
          lines.push(`Status: ${label}`);
          if (answer.owner) lines.push(`Verantwortlich: ${answer.owner}`);
          if (answer.source) lines.push(`Quelle: ${answer.source}`);
          lines.push("");
          lines.push(answer.answer || "_Noch keine Antwort._");
          lines.push("");

          if (question.followUps && question.followUps.length > 0) {
            lines.push("#### Folgefragen", "");
            for (const followUp of question.followUps) {
              const followUpAnswer = getAnswer(followUp.id);
              lines.push(`- ${followUp.text}`);
              lines.push(`  - Status: ${statusLabel(followUpAnswer)}`);
              if (followUpAnswer.owner) lines.push(`  - Verantwortlich: ${followUpAnswer.owner}`);
              if (followUpAnswer.source) lines.push(`  - Quelle: ${followUpAnswer.source}`);
              lines.push(`  - Antwort: ${followUpAnswer.answer || "_Noch keine Antwort._"}`);
              lines.push("");
            }
          }
        }
      }

      download(
        `${slugify(state.project || "projekt")}-fragebogen-antworten.md`,
        lines.join("\n"),
        "text/markdown"
      );
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    async function importJson(file) {
      const text = await file.text();
      const payload = JSON.parse(text);
      if (!payload.answers || typeof payload.answers !== "object") {
        throw new Error("Die Datei enthaelt keine gueltigen Antworten.");
      }

      state.answers = payload.answers;
      if (payload.project) {
        state.project = payload.project;
        els.projectName.value = payload.project;
      }
      if (payload.checklist && CHECKLISTS[payload.checklist]) {
        state.checklist = payload.checklist;
        els.checklistSource.value = payload.checklist;
        saveAnswers();
        await loadChecklist();
        return;
      }
      saveAnswers();
      render();
    }

    function resetProject() {
      const ok = window.confirm(
        `Alle lokal gespeicherten Antworten fuer "${state.project}" loeschen?`
      );
      if (!ok) return;
      state.answers = {};
      localStorage.removeItem(storageKey());
      render();
    }

    function attachEvents() {
      els.projectName.addEventListener("change", () => {
        state.project = els.projectName.value.trim() || "Unbenanntes Projekt";
        loadAnswers();
        render();
      });

      els.checklistSource.addEventListener("change", async () => {
        state.checklist = els.checklistSource.value;
        await loadChecklist();
      });

      els.search.addEventListener("input", render);
      els.filter.addEventListener("change", render);
      els.sortMode.addEventListener("change", render);
      els.exportJson.addEventListener("click", exportJson);
      els.exportMarkdown.addEventListener("click", exportMarkdown);
      els.importButton.addEventListener("click", () => els.importFile.click());
      els.resetProject.addEventListener("click", resetProject);
      els.importFile.addEventListener("change", async () => {
        const file = els.importFile.files[0];
        if (!file) return;
        try {
          await importJson(file);
        } catch (error) {
          alert(error.message);
        } finally {
          els.importFile.value = "";
        }
      });

      els.questionnaire.addEventListener("change", event => {
        const question = event.target.closest("[data-question-id]");
        if (!question) return;
        const id = question.dataset.questionId;
        const action = event.target.dataset.action;
        if (action === "status") {
          setAnswer(id, { status: event.target.value });
        }
        if (action === "help") {
          setAnswer(id, { needsHelp: event.target.checked });
        }
      });

      els.questionnaire.addEventListener("input", event => {
        const question = event.target.closest("[data-question-id]");
        if (!question) return;
        const id = question.dataset.questionId;
        const action = event.target.dataset.action;
        if (["answer", "owner", "source"].includes(action)) {
          const patch = {};
          patch[action] = event.target.value;
          saveAnswerQuietly(id, patch);
        }
      });
    }

    async function loadChecklist() {
      try {
        els.loadError.classList.add("hidden");
        const response = await fetch(CHECKLISTS[state.checklist].url);
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const markdown = await response.text();
        state.sections = parseChecklist(markdown);
        loadAnswers();
        render();
      } catch (error) {
        els.loadError.classList.remove("hidden");
        els.loadError.innerHTML = `
          <strong>Checkliste konnte nicht geladen werden.</strong><br>
          Starte diese Datei ueber einen lokalen Server oder ueber GitHub Pages,
          damit <code>${CHECKLISTS[state.checklist].url}</code> geladen werden kann.<br>
          Technischer Fehler: ${escapeHtml(error.message)}
        `;
      }
    }

    async function init() {
      attachEvents();
      els.checklistSource.value = state.checklist;
      await loadChecklist();
    }

    init();
  </script>
</body>
</html>
